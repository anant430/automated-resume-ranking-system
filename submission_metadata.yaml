methodology_summary: >
  Hybrid retrieval pipeline: BGE-small dense (FAISS) + BM25 sparse, fused via RRF (0.7/0.3).
  Candidates pre-filtered by 4-rule honeypot detector (company age, tool birth year, mass
  skill stuffing, chronological overlap). XGBoost dual-model ensemble (NDCG-optimized +
  MAP-proxy, 75/25 blend) over 22 features including trajectory velocity, learned engagement
  probability, and honeypot signals. Reasoning is fact-driven with 8 structural variants,
  rank-modulated tone bands (4 tiers), and quoted JD phrases. Phase 0 pseudo-labels from
  GPT-4 (offline only). Zero LLM calls in rank.py.
